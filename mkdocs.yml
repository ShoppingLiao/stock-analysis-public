site_name: Shopping 的股窩
site_description: 台股投資研究筆記 — DDMD 個股深度分析 + 黑飛舞短線策略(回測勝率 33% / 期望值 +1.31%/筆)
site_author: ShoppingLiao
site_url: https://shoppingliao.github.io/stock-analysis-public/

repo_name: ShoppingLiao/stock-analysis-public
repo_url: https://github.com/ShoppingLiao/stock-analysis-public

# Material theme
theme:
  name: material
  language: zh-TW
  font:
    text: Noto Sans TC
    code: Fira Code
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  favicon: assets/favicon.png

# 內容
nav:
  - 🏠 首頁: index.md
  - 📡 即時掃描候選:
    - 🦋 黑飛舞訊號: signals_black_butterfly.md
    - 🔥 紅爆訊號: signals_red_burst.md
  - 📊 DDMD 個股分析:
    - 個股清單(評分排名): reports/index.md
    - 框架說明: about/ddmd.md
    - 評分標準: about/scoring.md
  - 📡 黑飛舞短線策略:
    - 策略說明 + 回測 (v1): about/strategy.md
    - 🎯 v3 TDMD 快評 + 倉位連動 (現行): about/strategy_v3.md
    - 🔬 v2 失敗實驗(簡化出場 + 加碼): about/strategy_v2.md
    - 📊 各版戰績比較: about/strategy_compare.md
  - 🔥 紅爆中長線策略:
    - 🎯 現役版(V1 + dedupe): about/strategy_red_burst.md
    - 📜 V0 — D5 進場(原版): about/strategy_red_burst_v0.md
    - 🚀 V1 — D1 直接進場: about/strategy_red_burst_v1.md
    - 🎯 Dedupe — 同檔不重複: about/strategy_red_burst_dedupe.md
  - ⚠️ 免責聲明: disclaimer.md

# Markdown 擴充
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: 🔗
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Plugins
plugins:
  - search:
      lang:
        - zh
        - en
  # RSS feed:朋友可訂閱新增的分析(/feed_rss_created.xml)
  - rss:
      match_path: "reports/.*"
      date_from_meta:
        as_creation: "sync_date"
        as_update: "sync_date"
        datetime_format: "%Y-%m-%d"
      categories:
        - symbol
      pretty_print: true
      length: 30
      feed_ttl: 1440  # 24h
      image: https://shoppingliao.github.io/stock-analysis-public/assets/favicon.png

# Footer
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ShoppingLiao
    - icon: fontawesome/solid/rss
      link: /stock-analysis-public/feed_rss_created.xml
      name: RSS feed(新分析自動通知)
  generator: false  # 移除 "Made with Material"

extra_css:
  - assets/style.css

copyright: |
  &copy; 2026 ShoppingLiao —
  <strong>免責聲明</strong>:本站內容僅供研究參考,不構成投資建議
