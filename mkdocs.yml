site_name: 台股 DDMD 分析
site_description: 用「大大毛多」框架深度分析台股,結合動態出場策略與回測驗證
site_author: ShoppingLiao
site_url: https://shoppingliao.github.io/stock-analysis-public/

repo_name: ShoppingLiao/stock-analysis-public
repo_url: https://github.com/ShoppingLiao/stock-analysis-public

# Material theme
theme:
  name: material
  language: zh-TW
  custom_dir: overrides
  font:
    text: Noto Sans TC
    code: Fira Code
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  favicon: assets/favicon.png

# 內容
nav:
  - 首頁: index.md
  - DDMD 個股分析:
    - reports/index.md
    - 黑飛舞掃描: signals.md
  - 框架說明:
    - 什麼是 DDMD: about/ddmd.md
    - 黑飛舞策略: about/strategy.md
    - 評分標準: about/scoring.md
  - 免責聲明: disclaimer.md

# Markdown 擴充
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: 🔗
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Plugins
plugins:
  - search:
      lang:
        - zh
        - en

# Footer
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ShoppingLiao
  generator: false  # 移除 "Made with Material"

extra_css:
  - assets/style.css

copyright: |
  &copy; 2026 ShoppingLiao —
  <strong>免責聲明</strong>:本站內容僅供研究參考,不構成投資建議
